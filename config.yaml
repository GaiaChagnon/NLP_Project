# ── Data paths ──────────────────────────────────────────────
data:
  raw: data/books.csv
  clean: data/books_clean.csv
  enriched: data/books_enriched.csv
  embeddings: data/embeddings.npz

# ── OpenRouter LLM (genre + keyword enrichment) ────────────
llm:
  model: arcee-ai/trinity-large-preview:free
  base_url: https://openrouter.ai/api/v1
  batch_size: 5        # books per LLM call
  max_retries: 3
  retry_delay: 2       # seconds, multiplied by attempt number
  batch_delay: 0.5     # seconds between successive batches

# ── Embedding model ────────────────────────────────────────
embedding:
  model: BAAI/bge-large-en-v1.5
  description_max_chars: 400
  query_prefix: "Represent this sentence for searching relevant passages: "

# ── Recommendation scoring ─────────────────────────────────
# final_score = (1 - rating_weight) * cosine_sim
#             +      rating_weight  * normalised_rating
scoring:
  rating_weight: 0.1   # 0.0 = pure similarity, 1.0 = pure rating
  min_rating: 0.0
  max_rating: 5.0

# ── API server ─────────────────────────────────────────────
api:
  host: 0.0.0.0
  port: 8000
